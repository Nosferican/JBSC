bio: |
  Dr. Santiago Calderón is a senior research economist in the national economic accounts research group at the U.S. Bureau of Economic Analysis.
  Before joining the federal statistical system, he had years of experience in the private sector as a research scientist at various companies.
  Bayoán also held academic appointments with the Biocomplexity Institute and Initiative at the University of Virginia, where he started his career in public service.
  
  His research has centered on improving decision-making.
  His transdisciplinary research approach has enabled him to routinely collaborate across disciplines and develop a diverse set of domain knowledge and methodological toolset.
  He also participates in various open-source software communities (e.g., JuliaLang) and civic activism (e.g., Code4PR, Mentes Puertorriqueñas en Accion).

